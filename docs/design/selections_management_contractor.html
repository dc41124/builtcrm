<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BuiltCRM — Contractor Selections Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ================================================================
   DESIGN TOKENS — BuiltCRM Contractor Portal
   ================================================================ */
:root {
  --surface-0:#eef0f3;--surface-1:#ffffff;--surface-2:#f3f4f6;--surface-3:#e2e5e9;--surface-4:#d1d5db;--surface-hover:#f5f6f8;--surface-active:#e5e7eb;
  --sidebar-bg:#ffffff;--sidebar-hover:#f5f6f8;--sidebar-active:#eef0f3;--sidebar-active-text:#1a1714;--sidebar-section-text:#8b919a;--sidebar-item-text:#5a6170;--sidebar-border:#e8eaee;
  --text-primary:#1a1714;--text-secondary:#6b655b;--text-tertiary:#9c958a;--text-inverse:#faf9f7;
  --accent:#5b4fc7;--accent-hover:#4f44b3;--accent-soft:#eeedfb;--accent-text:#4a3fb0;--accent-muted:#c7c2ea;
  --success:#2d8a5e;--success-soft:#edf7f1;--success-text:#1e6b46;
  --warning:#c17a1a;--warning-soft:#fdf4e6;--warning-text:#96600f;
  --danger:#c93b3b;--danger-soft:#fdeaea;--danger-text:#a52e2e;
  --info:#3178b9;--info-soft:#e8f1fa;--info-text:#276299;
  --teal:#2a7f6f;--teal-soft:#e6f5f1;--teal-text:#1f6b5c;--teal-muted:#b0d9cf;
  --font-display:'DM Sans',system-ui,sans-serif;--font-body:'Instrument Sans',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:18px;
  --shadow-sm:0 1px 3px rgba(26,23,20,.05);--shadow-md:0 4px 16px rgba(26,23,20,.06);--shadow-lg:0 10px 32px rgba(26,23,20,.08);--shadow-ring:0 0 0 3px rgba(91,79,199,.15);
  --sidebar-width:272px;--topbar-height:56px;--ease-out:cubic-bezier(.16,1,.3,1);--duration-fast:120ms;--duration-normal:200ms;--duration-slow:350ms;
}
*,*::before,*::after{box-sizing:border-box;margin:0}
body{font-family:var(--font-body);background:var(--surface-0);color:var(--text-primary);-webkit-font-smoothing:antialiased;line-height:1.5}
button{cursor:pointer;font-family:inherit;border:none;background:none}input,select,textarea{font-family:inherit}

/* APP SHELL */
.app{display:grid;grid-template-columns:var(--sidebar-width) 1fr;min-height:100vh}
.sidebar{background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
.brand{height:var(--topbar-height);display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--sidebar-border);flex-shrink:0}
.brand-mark{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#1a1714,#3d3830);color:var(--text-inverse);display:grid;place-items:center;font-family:var(--font-display);font-size:12px;font-weight:700}
.brand-info h1{font-family:var(--font-display);font-size:14px;font-weight:700}.brand-info p{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.sidebar-search{padding:12px 16px;border-bottom:1px solid var(--sidebar-border);flex-shrink:0}
.sidebar-search input{width:100%;height:36px;border-radius:var(--radius-md);border:1px solid var(--surface-3);background:var(--surface-2);padding:0 12px;font-size:13px;color:var(--text-primary);outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 10px 20px}.nav-section{margin-bottom:4px}
.nav-section-label{font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--sidebar-section-text);text-transform:uppercase;letter-spacing:.06em;padding:10px 10px 6px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--radius-md);font-size:13px;color:var(--sidebar-item-text);font-weight:500;transition:all var(--duration-normal) var(--ease-out);margin-bottom:2px}
.nav-item:hover{background:var(--sidebar-hover);color:var(--sidebar-active-text)}.nav-item.active{background:var(--accent-soft);color:var(--accent-text);font-weight:650}
.nav-badge{min-width:20px;height:20px;padding:0 7px;border-radius:999px;background:var(--accent-soft);color:var(--accent-text);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.nav-badge.warn{background:var(--warning-soft);color:var(--warning-text)}.nav-badge.danger{background:var(--danger-soft);color:var(--danger-text)}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{height:var(--topbar-height);display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--surface-3);background:rgba(255,255,255,.88);backdrop-filter:blur(12px);flex-shrink:0;position:sticky;top:0;z-index:50}
.breadcrumbs{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-tertiary)}.breadcrumbs .sep{color:var(--surface-4)}.breadcrumbs .current{color:var(--text-primary);font-weight:650}
.topbar-actions{display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:white;display:grid;place-items:center;font-family:var(--font-display);font-size:12px;font-weight:700}
.content{padding:24px;flex:1}

/* BUTTONS */
.btn{height:38px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;font-weight:650;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--surface-3);background:var(--surface-1);color:var(--text-primary);transition:all var(--duration-normal) var(--ease-out)}
.btn:hover{border-color:var(--surface-4);background:var(--surface-hover)}.btn.primary{background:var(--accent);border-color:var(--accent);color:white}.btn.primary:hover{background:var(--accent-hover)}
.btn.sm{height:32px;padding:0 12px;font-size:12px}.btn.xs{height:28px;padding:0 10px;font-size:11px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text-secondary)}.btn.ghost:hover{background:var(--surface-2);color:var(--text-primary)}
.btn.success{background:var(--success);border-color:var(--success);color:white}.btn.success:hover{background:var(--success-text)}
.btn.warning-outline{border-color:#f5d5a0;color:var(--warning-text)}.btn.warning-outline:hover{background:var(--warning-soft)}
.btn.danger-outline{border-color:#f5baba;color:var(--danger-text)}.btn.danger-outline:hover{background:var(--danger-soft)}
.btn:active{transform:scale(.97)}

/* PILLS */
.pill{height:22px;padding:0 9px;border-radius:999px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;border:1px solid var(--surface-3);background:var(--surface-1);color:var(--text-tertiary);white-space:nowrap;flex-shrink:0}
.pill.accent{background:var(--accent-soft);color:var(--accent-text);border-color:var(--accent-muted)}
.pill.green{background:var(--success-soft);color:var(--success-text);border-color:#b0dfc4}
.pill.orange{background:var(--warning-soft);color:var(--warning-text);border-color:#f5d5a0}
.pill.red{background:var(--danger-soft);color:var(--danger-text);border-color:#f5baba}
.pill.blue{background:var(--info-soft);color:var(--info-text);border-color:#b3d1ec}
.pill.teal{background:var(--teal-soft);color:var(--teal-text);border-color:var(--teal-muted)}
.pill.dark{background:var(--text-primary);color:var(--text-inverse);border-color:var(--text-primary)}

/* SUMMARY */
.summary-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.sc{background:var(--surface-1);border:1px solid var(--surface-3);border-radius:var(--radius-lg);padding:13px 15px;box-shadow:var(--shadow-sm);transition:all var(--duration-normal) var(--ease-out)}
.sc.strong{border-color:var(--accent-muted);background:linear-gradient(180deg,#fff,#f5f3ff)}.sc.alert{border-color:#f5d5a0;background:linear-gradient(180deg,#fff,#fefaf3)}.sc.danger{border-color:#f5baba;background:linear-gradient(180deg,#fff,#fef5f5)}.sc.success{border-color:#b0dfc4;background:linear-gradient(180deg,#fff,#f5fdf8)}.sc.info{border-color:#b3d1ec;background:linear-gradient(180deg,#fff,#f5f9fe)}
.sc .sc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary)}
.sc .sc-value{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-.03em;margin-top:4px}
.sc .sc-meta{font-size:12px;color:var(--text-tertiary);margin-top:2px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface-2);border-radius:var(--radius-lg);padding:4px;width:fit-content}
.tab{height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:12px;font-weight:650;color:var(--text-secondary);display:inline-flex;align-items:center;gap:6px;transition:all var(--duration-normal) var(--ease-out)}
.tab:hover{color:var(--text-primary)}.tab.active{background:var(--surface-1);color:var(--text-primary);box-shadow:var(--shadow-sm)}
.tab-count{font-size:10px;font-weight:800;color:var(--text-tertiary);background:var(--surface-3);padding:1px 6px;border-radius:999px}.tab.active .tab-count{background:var(--accent-soft);color:var(--accent-text)}

/* WORKSPACE */
.workspace{display:grid;grid-template-columns:380px minmax(0,1fr);gap:16px;align-items:start}
.queue-panel{background:var(--surface-1);border:1px solid var(--surface-3);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);overflow:hidden}
.queue-header{padding:14px 16px;border-bottom:1px solid var(--surface-3);display:flex;align-items:center;justify-content:space-between}
.queue-header h3{font-family:var(--font-display);font-size:14px;font-weight:700}
.queue-search{padding:10px 14px;border-bottom:1px solid var(--surface-2)}
.queue-search input{width:100%;height:34px;border-radius:var(--radius-md);border:1px solid var(--surface-3);background:var(--surface-2);padding:0 12px;font-size:12px;outline:none}
.queue-search input:focus{border-color:var(--accent);background:white}
.queue-list{max-height:calc(100vh - 380px);overflow-y:auto}
.q-category{border-bottom:1px solid var(--surface-2)}.q-category:last-child{border-bottom:none}
.q-cat-label{padding:10px 16px 6px;font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between}
.q-cat-count{font-size:10px;font-weight:700;background:var(--surface-2);padding:2px 7px;border-radius:999px;color:var(--text-tertiary)}
.q-item{padding:10px 16px;cursor:pointer;transition:background var(--duration-fast) var(--ease-out);display:flex;align-items:center;gap:12px}
.q-item:hover{background:var(--surface-hover)}.q-item.active{background:var(--accent-soft)}
.q-swatch{width:40px;height:40px;border-radius:var(--radius-md);border:1px solid var(--surface-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.q-swatch .ms{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:100%;height:100%}.q-swatch .ms span{display:block}
.q-body{flex:1;min-width:0}.q-body h4{font-family:var(--font-display);font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-body p{font-size:11px;color:var(--text-tertiary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* DETAIL */
.d2{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:14px;align-items:start}
.d-main{display:flex;flex-direction:column;gap:14px}.d-rail{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface-1);border:1px solid var(--surface-3);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);overflow:hidden}
.d-hdr{padding:20px 22px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.d-hdr-left h2{font-family:var(--font-display);font-size:20px;font-weight:750;letter-spacing:-.02em}
.dh-cat{font-size:12px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.dh-desc{font-size:13px;color:var(--text-secondary);margin-top:4px;max-width:480px}
.dh-pills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.dh-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.d-meta{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:1px solid var(--surface-2)}
.dm{padding:14px 22px;border-bottom:1px solid var(--surface-2);border-right:1px solid var(--surface-2)}.dm:nth-child(even){border-right:none}
.dm .k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary)}
.dm .v{font-family:var(--font-display);font-size:14px;font-weight:700;margin-top:3px}.dm .m{font-size:11px;color:var(--text-tertiary);margin-top:1px}

/* OPTIONS TABLE */
.o-card{background:var(--surface-1);border:1px solid var(--surface-3);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm)}
.o-hdr{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--surface-2)}
.o-hdr h3{font-family:var(--font-display);font-size:15px;font-weight:700}
.ot{width:100%;border-collapse:collapse}
.ot th{font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);text-align:left;padding:10px 12px;background:var(--surface-2);border-bottom:1px solid var(--surface-3)}
.ot th:first-child{padding-left:20px}.ot th:last-child{padding-right:20px;text-align:right}
.ot td{padding:12px;font-size:13px;border-bottom:1px solid var(--surface-2);vertical-align:middle}
.ot td:first-child{padding-left:20px}.ot td:last-child{padding-right:20px;text-align:right}
.ot tr:last-child td{border-bottom:none}.ot tr:hover{background:var(--surface-hover)}
.ot tr.rec{background:rgba(91,79,199,.03)}.ot tr.sel{background:rgba(45,138,94,.05)}
.on{display:flex;align-items:center;gap:10px}
.os{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--surface-3);flex-shrink:0}
.ont h5{font-family:var(--font-display);font-size:13px;font-weight:700}
.ont p{font-size:11px;color:var(--text-tertiary);margin-top:1px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.op{font-family:var(--font-display);font-weight:700}.op.inc{color:var(--success-text)}.op.upg{color:var(--warning-text)}.op.prem{color:#a04d1a}
.ol{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)}.ol.w{color:var(--warning-text);font-weight:600}
.oa{font-size:11px;font-weight:600}.oa.ok{color:var(--success-text)}.oa.lim{color:var(--warning-text)}.oa.bo{color:var(--danger-text)}

/* CLIENT STATUS */
.cs-body{padding:16px 20px}
.cs-progress{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cs-bar{flex:1;height:6px;border-radius:999px;background:var(--surface-3);overflow:hidden}
.cs-fill{height:100%;border-radius:999px;background:var(--accent);transition:width var(--duration-slow) var(--ease-out)}
.cs-pct{font-family:var(--font-display);font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0}
.cs-tl{display:flex;flex-direction:column}
.cs-s{display:flex;gap:12px;position:relative;padding-bottom:14px}.cs-s:last-child{padding-bottom:0}
.cs-s::before{content:'';position:absolute;left:11px;top:24px;bottom:0;width:2px;background:var(--surface-3)}.cs-s:last-child::before{display:none}.cs-s.done::before{background:var(--accent-muted)}
.cs-d{width:24px;height:24px;border-radius:50%;border:2px solid var(--surface-3);background:white;display:grid;place-items:center;flex-shrink:0;position:relative;z-index:1}
.cs-s.done .cs-d{background:var(--accent);border-color:var(--accent)}.cs-s.done .cs-d svg{display:block}
.cs-s.cur .cs-d{border-color:var(--accent);background:white;box-shadow:0 0 0 4px var(--accent-soft)}
.cs-d svg{display:none;width:12px;height:12px;color:white}
.cs-st h5{font-size:13px;font-weight:650}.cs-st p{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.cs-s.done .cs-st h5{color:var(--text-secondary)}

/* ACTIVITY */
.a-list{padding:6px 20px 16px}
.a-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--surface-2)}.a-item:last-child{border-bottom:none}
.a-dot{width:8px;height:8px;border-radius:50%;background:var(--surface-4);flex-shrink:0;margin-top:5px}
.a-dot.purple{background:var(--accent)}.a-dot.green{background:var(--success)}.a-dot.orange{background:var(--warning)}.a-dot.teal{background:var(--teal)}
.a-text{flex:1;font-size:12px;color:var(--text-secondary);line-height:1.45}.a-text strong{color:var(--text-primary);font-weight:650}
.a-time{font-size:11px;color:var(--text-tertiary);white-space:nowrap;flex-shrink:0}

/* BUDGET ROWS */
.b-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--surface-2);font-size:13px}.b-row:last-child{border-bottom:none}
.b-row .bk{color:var(--text-secondary)}.b-row .bv{font-family:var(--font-display);font-weight:700}
.b-row.total{padding-top:10px;border-top:2px solid var(--surface-3)}.b-row.total .bk{font-weight:700;color:var(--text-primary)}.b-row.total .bv{font-size:15px}

/* BANNERS */
.rev-banner{background:var(--warning-soft);border:1px solid #f0cc8a;border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:flex-start;gap:12px}
.rev-banner h4{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--warning-text)}.rev-banner p{font-size:12px;color:var(--text-secondary);margin-top:2px}
.draft-banner{background:var(--surface-2);border:1px dashed var(--surface-4);border-radius:var(--radius-lg);padding:20px;text-align:center}
.draft-banner h4{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:4px}.draft-banner p{font-size:12px;color:var(--text-secondary);margin-bottom:12px}

/* FORM */
.f-sec{padding:16px 20px;border-bottom:1px solid var(--surface-2)}.f-sec:last-child{border-bottom:none}
.f-sec h4{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:12px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.f-row.full{grid-template-columns:1fr}
.f-grp{display:flex;flex-direction:column;gap:4px}
.f-grp label{font-size:12px;font-weight:650;color:var(--text-secondary)}
.f-grp input,.f-grp select,.f-grp textarea{height:38px;border-radius:var(--radius-md);border:1px solid var(--surface-3);background:var(--surface-2);padding:0 12px;font-size:13px;color:var(--text-primary);outline:none}
.f-grp input:focus,.f-grp select:focus,.f-grp textarea:focus{border-color:var(--accent);background:white}
.f-grp textarea{height:80px;padding:10px 12px;resize:vertical}.f-grp .hint{font-size:11px;color:var(--text-tertiary);margin-top:2px}
.f-toggle{display:flex;align-items:center;gap:10px;padding:10px 0}
.t-track{width:36px;height:20px;border-radius:10px;background:var(--surface-3);position:relative;cursor:pointer;transition:background var(--duration-normal) var(--ease-out)}
.t-track.on{background:var(--accent)}
.t-track::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform var(--duration-normal) var(--ease-out)}
.t-track.on::after{transform:translateX(16px)}
.omf{background:var(--surface-2);border:1px solid var(--surface-3);border-radius:var(--radius-lg);padding:14px 16px;margin-top:10px}

.r-hdr{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--surface-2)}
.r-hdr h3{font-family:var(--font-display);font-size:14px;font-weight:700}
@media(max-width:1200px){.workspace{grid-template-columns:1fr}.d2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">B</div><div class="brand-info"><h1>BuiltCRM</h1><p>Contractor Portal</p></div></div>
    <div class="sidebar-search"><input type="text" placeholder="Search projects…" /></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-section-label">Workspace</div>
        <div class="nav-item"><span>Dashboard</span></div>
        <div class="nav-item"><span>Project Directory</span><span class="nav-badge">24</span></div>
        <div class="nav-item"><span>Inbox</span><span class="nav-badge">8</span></div>

let budgetCard='';if(dc){const so=i.opts.find(o=>o.sel);budgetCard=`<div class="card"><div class="f-sec"><h4>Financial Impact</h4><div class="b-row"><span class="bk">Allowance</span><span class="bv">${fmt(i.al)}</span></div><div class="b-row"><span class="bk">Selected price</span><span class="bv">${fmt(so?.p||0)}</span></div><div class="b-row total"><span class="bk">Upgrade cost</span><span class="bv" style="color:${i.selUp>0?'var(--warning-text)':'var(--success-text)'}">${i.selUp>0?'+'+fmt(i.selUp):'$0'}</span></div><div class="b-row"><span class="bk">Order status</span><span class="bv" style="color:var(--success-text)">Placed</span></div></div></div>`;}

return`<div class="d2"><div class="d-main">${rev}<div class="card"><div class="d-hdr"><div class="d-hdr-left"><div class="dh-cat">${i.cat}</div><h2>${i.t}</h2><div class="dh-desc">${i.desc}</div><div class="dh-pills">${pills}</div></div><div class="dh-actions">${acts}</div></div><div class="d-meta">${meta}</div></div>
<div class="o-card"><div class="o-hdr"><h3>${dc?'Options (Decided)':'Curated Options'}</h3><div style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;color:var(--text-tertiary)">${i.opts.length} option${i.opts.length!==1?'s':''}</span>${!dc?'<button class="btn xs primary"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Add</button>':''}</div></div>${rOT(i,dc||rv)}</div></div>
<div class="d-rail"><div class="card"><div class="r-hdr"><h3>Client Decision</h3>${csPill}</div>${rTL(i)}</div>${budgetCard}<div class="card"><div class="r-hdr"><h3>Activity</h3></div><div class="a-list">${rAct(i)}</div></div></div></div>`;}

function rSum(){const tot=I.length,dr=I.filter(i=>i.st==='draft').length,pub=I.filter(i=>i.st==='published'||i.st==='revision').length;
const aw=I.filter(i=>(i.st==='published'||i.st==='revision')).length,od=I.filter(i=>i.od).length,dec=I.filter(i=>i.st==='decided').length;
const ut=I.filter(i=>i.st==='decided').reduce((s,i)=>s+(i.selUp||0),0),ta=I.reduce((s,i)=>s+i.al,0);
return`<div class="summary-strip"><div class="sc strong"><div class="sc-label">Total Items</div><div class="sc-value">${tot}</div><div class="sc-meta">${pub} published · ${dr} draft</div></div>
<div class="sc alert"><div class="sc-label">Awaiting Decision</div><div class="sc-value">${aw}</div><div class="sc-meta">Published, no confirmation</div></div>
<div class="sc danger"><div class="sc-label">Overdue</div><div class="sc-value">${od}</div><div class="sc-meta">Past deadline</div></div>
<div class="sc success"><div class="sc-label">Upgrade Impact</div><div class="sc-value">+${fmt(ut)}</div><div class="sc-meta">${dec} confirmed</div></div>
<div class="sc info"><div class="sc-label">Total Allowances</div><div class="sc-value">${fmt(ta)}</div><div class="sc-meta">All categories</div></div></div>`;}

function render(){if(cView==='create'){rCreate();return;}
const fl=I.filter(F[cTab]);if(!fl.find(i=>i.id===cId)&&fl.length)cId=fl[0].id;
const ai=I.find(i=>i.id===cId);const tc={all:I.length,draft:I.filter(i=>i.st==='draft').length,published:I.filter(i=>i.st==='published').length,decided:I.filter(i=>i.st==='decided').length,revision:I.filter(i=>i.st==='revision').length};
let h=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:16px"><div><h2 style="font-family:var(--font-display);font-size:24px;font-weight:750;letter-spacing:-.03em">Selections Management</h2><p style="margin-top:4px;font-size:13px;color:var(--text-secondary);max-width:560px">Create and curate finish options for your clients. Publish when ready — items are invisible to the homeowner until published.</p></div><div style="display:flex;gap:8px;flex-shrink:0;padding-top:4px"><button class="btn sm"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg> Filter</button><button class="btn sm primary" onclick="go('create')"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> New Item</button></div></div>`;
h+=rSum();
h+='<div class="tabs">';['all','draft','published','decided','revision'].forEach(t=>{h+=`<button class="tab${cTab===t?' active':''}" onclick="fTab('${t}')">${t[0].toUpperCase()+t.slice(1)} <span class="tab-count">${tc[t]}</span></button>`;});h+='</div>';
if(!fl.length)h+=`<div style="text-align:center;padding:60px 20px"><h3 style="font-family:var(--font-display);font-size:16px;font-weight:700;margin-top:12px">No items in this view</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:4px">Items will appear here when they match this filter.</p></div>`;
else h+=`<div class="workspace"><div class="queue-panel"><div class="queue-header"><h3>Selection Items</h3><span style="font-size:12px;color:var(--text-tertiary)">${fl.length} item${fl.length!==1?'s':''}</span></div><div class="queue-search"><input type="text" placeholder="Search selections…" /></div><div class="queue-list">${rQ(fl)}</div></div><div id="DA">${ai?rD(ai):''}</div></div>`;
$('#C').innerHTML=h;$('#bc').textContent='Selections';}

function rCreate(){let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px"><button class="btn sm ghost" onclick="go('workspace')"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back</button><h2 style="font-family:var(--font-display);font-size:22px;font-weight:750;letter-spacing:-.02em">New Selection Item</h2></div>`;
h+=`<div class="d2"><div class="d-main"><div class="card"><div class="f-sec"><h4>Item Details</h4><div class="f-row"><div class="f-grp"><label>Category</label><select><option>Kitchen</option><option>Master Bathroom</option><option>Living Room</option><option>Exterior</option><option>+ New Category…</option></select></div><div class="f-grp"><label>Item Title</label><input type="text" placeholder="e.g., Backsplash Tile"/></div></div><div class="f-row full"><div class="f-grp"><label>Description</label><textarea placeholder="Explain what this selection is for…"></textarea><div class="hint">Shown to the homeowner for context.</div></div></div></div>
<div class="f-sec"><h4>Budget & Timing</h4><div class="f-row"><div class="f-grp"><label>Allowance ($)</label><input type="text" placeholder="0.00"/><div class="hint">At or below = "Included" for client.</div></div><div class="f-grp"><label>Decision Deadline</label><input type="date"/></div></div>
<div class="f-toggle"><div class="t-track on" onclick="this.classList.toggle('on')"></div><div><label>Affects Schedule</label><div class="hint">Warn client that late decisions impact timeline.</div></div></div>
<div class="f-row full" style="margin-top:8px"><div class="f-grp"><label>Schedule Impact Note</label><input type="text" placeholder="e.g., Must order before framing"/></div></div>
<div class="f-row"><div class="f-grp"><label>Revision Window (hours)</label><input type="text" value="48"/><div class="hint">Client can change mind after confirming.</div></div><div class="f-grp"><label>Sort Order</label><input type="text" value="0"/></div></div></div></div>
<div class="card"><div class="f-sec"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h4 style="margin:0">Options</h4><button class="btn xs primary"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Add Option</button></div>
<p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">Add 2–5 curated options. Include supplier info and SKU for procurement tracking.</p>
${[1,2].map(n=>`<div class="omf"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-family:var(--font-display);font-size:13px;font-weight:700">Option ${n}</span><div style="display:flex;gap:6px">${n===1?'<span class="pill accent">Recommended</span>':''}<button class="btn xs ghost" style="color:var(--danger-text)">Remove</button></div></div>
<div class="f-row"><div class="f-grp"><label>Name</label><input type="text" placeholder="Option name"/></div><div class="f-grp"><label>Price ($)</label><input type="text" placeholder="0.00"/></div></div>
<div class="f-row"><div class="f-grp"><label>Lead Time (days)</label><input type="text" placeholder="5"/></div><div class="f-grp"><label>Tier</label><select><option>Auto-calculate</option><option>Included</option><option>Upgrade</option><option>Premium</option></select></div></div>
<div class="f-row"><div class="f-grp"><label>Supplier</label><input type="text" placeholder="Supplier name"/></div><div class="f-grp"><label>SKU / Model #</label><input type="text" placeholder="Model number"/></div></div>
<div class="f-row full"><div class="f-grp"><label>Description</label><input type="text" placeholder="Brief description for option card"/></div></div></div>`).join('')}
</div></div></div>
<div class="d-rail"><div class="card"><div class="f-sec"><h4>Publish Settings</h4><p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px">Items stay draft until published. Homeowner cannot see drafts.</p><div style="display:flex;flex-direction:column;gap:8px"><button class="btn primary" style="width:100%"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg> Publish to Client</button><button class="btn" style="width:100%">Save as Draft</button></div>
<div class="f-toggle" style="margin-top:12px"><div class="t-track on" onclick="this.classList.toggle('on')"></div><div><label>Notify Client on Publish</label><div class="hint">Send email when this item goes live.</div></div></div></div></div>
<div class="card"><div class="f-sec"><h4>Publish Checklist</h4><div style="display:flex;flex-direction:column;gap:8px">${['Title and description','Allowance amount set','At least 2 options','One marked recommended','Decision deadline set','Supplier info on all options'].map(t=>`<div style="display:flex;align-items:center;gap:8px;font-size:13px"><div style="width:18px;height:18px;border-radius:4px;border:2px solid var(--surface-4);flex-shrink:0"></div><span>${t}</span></div>`).join('')}</div></div></div>
<div class="card"><div class="f-sec"><h4>Client Preview</h4><p style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">How it looks in the homeowner portal.</p><div style="background:var(--surface-2);border:1px solid var(--surface-3);border-radius:var(--radius-lg);overflow:hidden"><div style="height:56px;background:linear-gradient(135deg,var(--surface-3),var(--surface-4));display:flex;align-items:flex-end;padding:8px 10px"><div style="display:flex;gap:4px"><div style="width:22px;height:22px;border-radius:6px;background:var(--surface-4);border:1.5px solid rgba(255,255,255,.7)"></div><div style="width:22px;height:22px;border-radius:6px;background:var(--surface-4);border:1.5px solid rgba(255,255,255,.7)"></div></div></div><div style="padding:10px 12px"><div style="font-family:var(--font-display);font-size:12px;font-weight:700">Item Title</div><div style="font-size:10px;color:var(--text-tertiary);margin-top:2px">Description…</div><div style="display:flex;gap:4px;margin-top:6px"><span class="pill" style="font-size:9px;height:18px;padding:0 6px">Status</span><span class="pill" style="font-size:9px;height:18px;padding:0 6px">N options</span></div></div></div></div></div>
</div></div>`;
$('#C').innerHTML=h;$('#bc').textContent='New Selection Item';}

function go(v){cView=v;render();window.scrollTo(0,0);}
function sel(id){cId=id;cView='workspace';render();}
function fTab(t){cTab=t;const fl=I.filter(F[t]);if(fl.length)cId=fl[0].id;render();}
render();
</script>
</body>
</html>
