.f-grp{display:flex;flex-direction:column;gap:4px}

.view{display:none}.view.active{display:block}

function buildSidebar(){const cfg=sidebars[portal],nav=$('#sidebarNav');nav.innerHTML='';
if(portal==='sub'){const b=document.createElement('div');b.className='compliance-banner';b.textContent='1 compliance item at risk · Payment held';nav.appendChild(b);}
cfg.sections.forEach(sec=>{const s=document.createElement('div');s.className='nav-section';s.innerHTML=`<div class="nav-section-label">${sec.label}</div>`;sec.items.forEach(item=>{const el=document.createElement('div');el.className='nav-item'+(item.active?' active':'');let r='';if(item.b)r+=`<span class="nav-badge${item.bt==='warn'?' warn':item.bt==='danger'?' danger':''}">${item.b}</span>`;el.innerHTML=`<span>${item.n}</span>${r}`;s.appendChild(el);});nav.appendChild(s);});}

function sPill(r){if(r.st==='completed')return'<span class="pill green">Completed</span>';if(r.st==='submitted')return'<span class="pill blue">Submitted</span>';if(r.overdue)return'<span class="pill red">Overdue</span>';if(r.dueToday)return'<span class="pill orange">Due Today</span>';return'<span class="pill accent">Open</span>';}

function rQueue(items){return items.map(r=>{const a=r.id===cId?' active':'';
return`<div class="q-item${a}" onclick="sel('${r.id}')"><div class="q-item-top"><div><h4>${r.t}</h4><p>${portal==='gc'?r.org:r.desc.substring(0,60)+'…'}</p></div>${sPill(r)}</div>
<div class="q-item-meta"><span class="pill">${r.st==='completed'?'Done':r.st==='submitted'?r.files.length+' file'+(r.files.length!==1?'s':''):'Awaiting'}</span><span class="pill">Due ${r.due}</span>${portal==='gc'?`<span class="pill">${r.orgShort}</span>`:''}<span class="pill">${r.fileType}</span></div></div>`;}).join('');}

function rDetail(r){const isGC=portal==='gc',isSub=portal==='sub';
let pills='';if(r.overdue)pills+='<span class="pill red">Overdue · '+r.odDays+'d</span>';if(r.st==='open')pills+='<span class="pill accent">Open</span>';else if(r.st==='submitted')pills+='<span class="pill blue">Submitted</span>';else pills+='<span class="pill green">Completed</span>';
if(r.multi)pills+='<span class="pill">Multiple files</span>';pills+=`<span class="pill">${r.fileType}</span>`;

let actions='';
if(isGC&&r.st==='open')actions=`<button class="btn sm warning-outline">Send Reminder</button><button class="btn sm ghost">Reassign</button><button class="btn sm danger-outline">Cancel</button>`;
else if(isGC&&r.st==='submitted')actions=`<button class="btn sm success">Accept & Close</button><button class="btn sm warning-outline">Request Revision</button>`;
else if(isGC&&r.st==='completed')actions=`<button class="btn sm ghost">Reopen</button>`;
else if(isSub&&r.st==='open')actions=`<button class="btn sm primary">Upload Files</button>`;
else if(isSub&&r.st==='submitted')actions='<span style="font-size:12px;color:var(--text-tertiary)">Waiting on GC review</span>';

let meta='';
meta+=`<div class="dm"><div class="k">${isGC?'Assigned To':'Requested By'}</div><div class="v">${isGC?r.org:'Dan Carter'}</div><div class="m">${isGC?'Subcontractor':'Contractor PM'}</div></div>`;
meta+=`<div class="dm"><div class="k">Due Date</div><div class="v"${r.overdue?' style="color:var(--danger)"':''}>${r.due}</div><div class="m">${r.overdue?r.odDays+'d overdue':r.dueToday?'Due today':''}</div></div>`;
meta+=`<div class="dm"><div class="k">File Type</div><div class="v">${r.fileType}</div><div class="m">${r.multi?'Multiple files allowed':'Single file'}</div></div>`;
meta+=`<div class="dm"><div class="k">${r.related?'Related To':'Status'}</div><div class="v">${r.related||r.st[0].toUpperCase()+r.st.slice(1)}</div><div class="m">${r.relType||''}</div></div>`;

// Files section
let filesHTML='';
if(r.files.length>0){filesHTML=`<div class="card"><div class="r-hdr"><h3>${isGC&&r.st==='submitted'?'Submitted Files — Review Required':'Submitted Files'}</h3><span class="pill ${r.st==='submitted'?'blue':'green'}">${r.files.length} file${r.files.length!==1?'s':''}</span></div><div class="r-body">`;
r.files.forEach(f=>{filesHTML+=`<div class="file-row"><div><h5>${f.name}</h5><p>${isSub?'Uploaded':'Received'} ${f.time}</p></div><div class="file-chip">${f.size}</div></div>`;});
if(r.subNote)filesHTML+=`<div style="margin-top:12px;padding:12px 14px;background:var(--surface-2);border-radius:var(--radius-md);border:1px solid var(--surface-3)"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);margin-bottom:4px">Response Note</div><p style="font-size:13px;color:var(--text-secondary);line-height:1.5">${r.subNote}</p></div>`;
filesHTML+='</div></div>';}
else if(isSub&&r.st==='open'){filesHTML=`<div class="card"><div class="r-hdr"><h3>Upload Response</h3><span class="pill accent">Required</span></div><div class="r-body">
<div class="upload-zone"><h5>Drop files here or click to upload</h5><p>Upload ${r.fileType} files for this request. ${r.multi?'Multiple files accepted.':'Single file only.'}</p><div style="display:flex;gap:8px;justify-content:center"><button class="btn sm primary">Upload Files</button><button class="btn sm">Use Project File</button></div></div>
<div style="margin-top:12px"><div class="f-grp"><label>Response Note (optional)</label><textarea placeholder="Add context about your submission…" style="height:60px"></textarea></div></div>
</div></div>`;}
else if(isGC&&r.st==='open'){filesHTML=`<div class="card"><div class="r-hdr"><h3>Submission Status</h3><span class="pill accent">Awaiting</span></div><div class="r-body"><div style="text-align:center;padding:20px"><svg width="36" height="36" fill="none" stroke="var(--surface-4)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><p style="font-size:13px;color:var(--text-secondary);margin-top:8px">No files submitted yet. ${r.org} has been notified.</p></div></div></div>`;}

const act=isGC?r.gcAct:r.subAct;
const actHTML=act.map(a=>`<div class="a-item"><div class="a-dot ${a.c}"></div><div class="a-text">${a.x}</div><div class="a-time">${a.t}</div></div>`).join('');

return`<div class="d2"><div class="d-main">
<div class="card"><div class="d-hdr"><div class="d-hdr-left"><h2>${r.t}</h2><div class="dh-desc">${r.desc}</div><div class="dh-pills">${pills}</div></div><div class="dh-actions">${actions}</div></div><div class="d-meta">${meta}</div></div>
${filesHTML}</div>
<div class="d-rail"><div class="card"><div class="r-hdr"><h3>Activity</h3></div><div class="a-list">${actHTML}</div></div>
${isGC&&r.st==='open'?`<div class="card"><div class="f-sec"><h4>Request Details</h4><p style="font-size:12px;color:var(--text-secondary)">This request was sent to <strong>${r.org}</strong>. If no response is received by the due date, consider sending a reminder or reassigning.</p></div></div>`:''}
${isSub&&r.st==='open'?`<div class="card"><div class="f-sec"><h4>What the GC Needs</h4><p style="font-size:12px;color:var(--text-secondary)">${r.desc}</p><div style="margin-top:10px;display:flex;flex-direction:column;gap:6px"><div style="display:flex;align-items:center;gap:6px;font-size:12px"><span class="pill">${r.fileType}</span> Accepted format</div><div style="display:flex;align-items:center;gap:6px;font-size:12px"><span class="pill">${r.multi?'Multiple':'Single'}</span> File count</div>${r.related?`<div style="display:flex;align-items:center;gap:6px;font-size:12px"><span class="pill">${r.relType}</span> ${r.related}</div>`:''}</div></div></div>`:''}
</div></div>`;}

function render(){const cfg=sidebars[portal];
const items=REQS.filter(portal==='sub'?r=>['Apex Mechanical','Brightline Interiors'].includes(r.org):()=>true).filter(GC_TABS[cTab]);
if(!items.find(r=>r.id===cId)&&items.length)cId=items[0].id;
const active=REQS.find(r=>r.id===cId);

const allItems=portal==='sub'?REQS.filter(r=>['Apex Mechanical','Brightline Interiors'].includes(r.org)):REQS;
const tc={all:allItems.length,open:allItems.filter(r=>r.st==='open').length,submitted:allItems.filter(r=>r.st==='submitted').length,completed:allItems.filter(r=>r.st==='completed').length};
const od=allItems.filter(r=>r.overdue).length;

let h=`<div class="portal-switch"><button class="portal-tab${portal==='gc'?' active':''}" onclick="switchPortal('gc')"><span class="portal-dot purple"></span> Contractor</button><button class="portal-tab${portal==='sub'?' active':''}" onclick="switchPortal('sub')"><span class="portal-dot steel"></span> Subcontractor</button></div>`;

h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:16px"><div><h2 style="font-family:var(--font-display);font-size:24px;font-weight:750;letter-spacing:-.03em">${portal==='gc'?'Upload Requests':'Upload Requests — Response'}</h2><p style="margin-top:4px;font-size:13px;color:var(--text-secondary);max-width:560px">${portal==='gc'?'Issue requests, track submissions, and review files from subcontractors.':'See requests from the GC, upload files, and submit responses.'}</p></div>
<div style="display:flex;gap:8px">${portal==='gc'?'<button class="btn sm primary" onclick="go(\'create\')"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> New Request</button>':''}</div></div>`;

h+=`<div class="summary-strip"><div class="sc strong"><div class="sc-label">${portal==='gc'?'Total Requests':'Assigned to You'}</div><div class="sc-value">${tc.all}</div><div class="sc-meta">${tc.open} open · ${tc.submitted} submitted</div></div>
<div class="sc alert"><div class="sc-label">Open</div><div class="sc-value">${tc.open}</div><div class="sc-meta">${portal==='gc'?'Waiting on subcontractor':'Need your response'}</div></div>
<div class="sc${od>0?' danger':''}"><div class="sc-label">Overdue</div><div class="sc-value">${od}</div><div class="sc-meta">${od>0?'Needs immediate attention':'All on track'}</div></div>
<div class="sc success"><div class="sc-label">Completed</div><div class="sc-value">${tc.completed}</div><div class="sc-meta">Accepted and closed</div></div></div>`;

h+='<div class="tabs">';['all','open','submitted','completed'].forEach(t=>{h+=`<button class="tab${cTab===t?' active':''}" onclick="fTab('${t}')">${t[0].toUpperCase()+t.slice(1)} <span class="tab-count">${tc[t]}</span></button>`;});h+='</div>';

if(!items.length)h+=`<div style="text-align:center;padding:60px"><h3 style="font-family:var(--font-display);font-size:16px;font-weight:700">No requests in this view</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:4px">Requests will appear here when they match this filter.</p></div>`;
else h+=`<div class="workspace"><div class="queue-panel"><div class="queue-header"><h3>${portal==='gc'?'Request Queue':'Assigned Requests'}</h3><span style="font-size:12px;color:var(--text-tertiary)">${items.length} item${items.length!==1?'s':''}</span></div><div class="queue-search"><input type="text" placeholder="Search requests…"/></div><div class="queue-list">${rQueue(items)}</div></div><div>${active?rDetail(active):''}</div></div>`;

$('#C').innerHTML=h;$('#portalLabel').textContent=cfg.label;$('#bcPortal').textContent=cfg.bc;$('#userAvatar').textContent=cfg.avatar;}

function switchPortal(p){portal=p;cTab='all';const app=$('#app');app.classList.toggle('sub',p==='sub');buildSidebar();
const items=p==='sub'?REQS.filter(r=>['Apex Mechanical','Brightline Interiors'].includes(r.org)):REQS;
if(items.length)cId=items[0].id;render();}
function sel(id){cId=id;render();}
function fTab(t){cTab=t;render();}
function go(v){/* create view placeholder */}

buildSidebar();render();
</script>
</body>
</html>
