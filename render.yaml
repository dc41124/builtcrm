# Render Blueprint — portfolio-mode deploy.
# See docs/specs/prod_cutover_prep.md for the full env-var manifest and
# the trigger condition for migrating off the shared-with-dev resources.

services:
  - type: web
    name: builtcrm
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0

      # All secrets below: set in the Render dashboard, never committed.
      # `sync: false` prevents Render from echoing values across envs.
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_ADMIN_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: TAX_ID_ENCRYPTION_KEY
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: INTEGRATION_STATE_SECRET
        sync: false
      - key: TRIGGER_SECRET_KEY
        sync: false

      # Optional — leave unset on free tier until needed.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
